<app-page-header title="Categorias" description="Catalogo para organizar los productos por tipo." />

@if (listViewModel$ | async; as vm) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Categorias</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="inline-form" [formGroup]="categoriaForm" (ngSubmit)="addCategoria()">
        <mat-form-field appearance="outline">
          <mat-label>Nueva categoria</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>
        <button mat-flat-button class="primary-action" type="submit" [disabled]="categoriaForm.invalid">Agregar</button>
      </form>

      <div class="catalog-list">
        @for (item of vm.categorias.items; track item.id) {
          <div>
            <span>{{ item.nombre }}</span>
            <button mat-icon-button color="warn" type="button" (click)="removeCategoria(item.id!)" aria-label="Eliminar categoria">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        } @empty {
          <p class="empty-state">No hay categorias registradas.</p>
        }
      </div>

      <mat-paginator
        [length]="vm.categorias.total"
        [pageIndex]="vm.categorias.pageIndex"
        [pageSize]="vm.categorias.pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="updatePage($event)"
      />
    </mat-card-content>
  </mat-card>
}
