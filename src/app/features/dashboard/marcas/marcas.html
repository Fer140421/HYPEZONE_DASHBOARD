<app-page-header title="Marcas" description="Catalogo de marcas para los formularios de producto y lote." />

@if (listViewModel$ | async; as vm) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Marcas</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="inline-form" [formGroup]="marcaForm" (ngSubmit)="addMarca()">
        <mat-form-field appearance="outline">
          <mat-label>Nueva marca</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>
        <button mat-flat-button class="primary-action" type="submit" [disabled]="marcaForm.invalid">Agregar</button>
      </form>

      <div class="catalog-list">
        @for (item of vm.marcas.items; track item.id) {
          <div>
            <span>{{ item.nombre }}</span>
            <button mat-icon-button color="warn" type="button" (click)="removeMarca(item.id!)" aria-label="Eliminar marca">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        } @empty {
          <p class="empty-state">No hay marcas registradas.</p>
        }
      </div>

      <mat-paginator
        [length]="vm.marcas.total"
        [pageIndex]="vm.marcas.pageIndex"
        [pageSize]="vm.marcas.pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="updatePage($event)"
      />
    </mat-card-content>
  </mat-card>
}
