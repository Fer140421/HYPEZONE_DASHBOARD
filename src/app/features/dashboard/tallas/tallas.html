<app-page-header title="Tallas" description="Catalogo de tallas para estandarizar la carga de productos." />

@if (listViewModel$ | async; as vm) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Tallas</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="inline-form" [formGroup]="tallaForm" (ngSubmit)="addTalla()">
        <mat-form-field appearance="outline">
          <mat-label>Nueva talla</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>
        <button mat-flat-button class="primary-action" type="submit" [disabled]="tallaForm.invalid">Agregar</button>
      </form>

      <div class="catalog-list">
        @for (item of vm.tallas.items; track item.id) {
          <div>
            <span>{{ item.nombre }}</span>
            <button mat-icon-button color="warn" type="button" (click)="removeTalla(item.id!)" aria-label="Eliminar talla">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        } @empty {
          <p class="empty-state">No hay tallas registradas.</p>
        }
      </div>

      <mat-paginator
        [length]="vm.tallas.total"
        [pageIndex]="vm.tallas.pageIndex"
        [pageSize]="vm.tallas.pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (page)="updatePage($event)"
      />
    </mat-card-content>
  </mat-card>
}
